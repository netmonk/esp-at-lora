; PlatformIO project for LilyGO TTGO LoRa32 T3 v1.6.1 (433 MHz, SX1278)
; AT-command LoRa modem firmware compatible with AT_COMMANDS.md (at-os3 interface)

[env:ttgo-lora32-v16]
platform = espressif32
board = ttgo-lora32-v1
framework = arduino

monitor_speed = 115200
monitor_filters = direct

; Build flags: serial baud + LoRa pin map for T3 v1.6.x
build_flags =
    -D AT_UART_BAUD=115200
    -D PIN_LORA_SCK=5
    -D PIN_LORA_MISO=19
    -D PIN_LORA_MOSI=27
    -D PIN_LORA_NSS=18
    -D PIN_LORA_RST=23
    -D PIN_LORA_DIO0=26
    -D PIN_LORA_DIO1=33
    ; SSD1306 OLED (128x64) on the T3 v1.6.1 I2C bus
    -D PIN_OLED_SDA=21
    -D PIN_OLED_SCL=22
    -D PIN_OLED_RST=-1
    -D OLED_ADDR=0x3C

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
